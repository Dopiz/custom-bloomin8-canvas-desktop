  /* Full-bleed gradient card with white line-art icons, in the style of the
     reference mock: the background gradient is driven by the CURRENT WEATHER
     CONDITION group (see ICON_THEME in weather.py), not the clock — clear
     skies get a warm sunny gradient, rain a steel blue, a thunderstorm a
     dark dramatic purple-navy, and so on. Every theme keeps a dark-enough
     base so white text/icons stay legible.
     E-ink note (Spectra 6): saturated gradient hues dither into a soft
     painterly texture, which reads well; white strokes/text stay crisp. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }
  body {
    font-family: "Nunito Sans", "Avenir Next", "Helvetica Neue", "PingFang TC", Arial, sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    text-align: center;
    padding: 7vmin 6vmin 10vmin;
  }
  /* Clear / mostly clear: warm sunny amber-gold. */
  body.theme-clear   { background: linear-gradient(170deg, #f8c94c 0%, #ee8a3c 100%); }
  /* Partly cloudy / overcast: cool neutral slate blue-gray. */
  body.theme-cloudy  { background: linear-gradient(170deg, #8b95a8 0%, #4a5268 100%); }
  /* Fog: muted, pale gray-teal. */
  body.theme-fog     { background: linear-gradient(170deg, #9ab0ab 0%, #56736e 100%); }
  /* Drizzle / rain: blue / steel-blue. */
  body.theme-rain    { background: linear-gradient(170deg, #4f7fa8 0%, #1e3c56 100%); }
  /* Thunderstorm: dark, dramatic purple-navy. */
  body.theme-thunder { background: linear-gradient(170deg, #4a3568 0%, #171225 100%); }
  /* Snow: pale icy blue-white. */
  body.theme-snow    { background: linear-gradient(170deg, #a8ccdb 0%, #5a7f92 100%); }

  .header, .hero, .forecast-wrap { flex: none; }
  .header { display: flex; flex-direction: column; align-items: center; }
  .hero { display: flex; flex-direction: column; align-items: center; }

  .date { font-size: 3.1vmin; font-weight: 500; letter-spacing: 0.06em; opacity: 0.95; }
  .time { font-size: 7vmin; font-weight: 400; margin-top: 1.2vmin; }
  .city { font-size: 3.1vmin; font-weight: 500; letter-spacing: 0.08em; margin-top: 1.6vmin; opacity: 0.95; }

  .hero-icon { width: 29vmin; height: 29vmin; margin: 3vmin 0 2vmin; flex: none; }

  .temp {
    font-size: 18vmin;
    font-weight: 200;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .condition { font-size: 4.6vmin; font-weight: 400; margin-top: 2vmin; letter-spacing: 0.04em; }
  .subline { font-size: 2.9vmin; font-weight: 400; margin-top: 1.4vmin; opacity: 0.85; }

  .rule {
    width: 62vmin;
    border-top: 0.22vmin solid rgba(255, 255, 255, 0.8);
    margin: 3.5vmin 0 3vmin;
  }

  .forecast { display: flex; width: 100%; }
  .cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5vmin;
  }
  /* nowrap is load-bearing: portrait height is ~133vmin (vmin is based on the
     shorter dimension, width), so the layout has little slack — a wrapped
     "12 AM" label used to add enough height to push the forecast row past
     the bottom edge, which overflow:hidden then silently clipped. */
  .cell-time { font-size: 2.7vmin; font-weight: 500; letter-spacing: 0.02em; opacity: 0.95; white-space: nowrap; }
  .cell-icon { width: 9vmin; height: 9vmin; }
  .cell-temp { font-size: 4.2vmin; font-weight: 400; font-variant-numeric: tabular-nums; }
  .cell-pop { font-size: 2.9vmin; font-weight: 500; opacity: 0.85; font-variant-numeric: tabular-nums; }

  @media (orientation: landscape) {
    body { padding: 5vmin 6vmin 7vmin; }
    .date, .city { font-size: 2.6vmin; }
    .time { font-size: 5vmin; margin-top: 0.8vmin; }
    .city { margin-top: 1vmin; }
    .hero-icon { width: 18vmin; height: 18vmin; margin: 2.2vmin 0 1.4vmin; }
    .temp { font-size: 13vmin; }
    .condition { font-size: 3.8vmin; margin-top: 1.4vmin; }
    .subline { font-size: 2.6vmin; margin-top: 1vmin; }
    .rule { margin: 2.4vmin 0 2vmin; }
    .forecast { width: 82%; }
    .cell { gap: 1.1vmin; }
    .cell-icon { width: 7.5vmin; height: 7.5vmin; }
    .cell-temp { font-size: 3.6vmin; }
    .cell-time, .cell-pop { font-size: 2.6vmin; }
  }
</style>
</head>
